<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清掃報告書</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--blue:#0F4C75;--blue2:#1B6CA8;--blue-light:#EFF6FF;--green:#10B981;--red:#EF4444;--amber:#F59E0B;--gray:#F0F4F8;--gray2:#F8FAFC;--border:#E2E8F0;--text:#1a1a2e;--text2:#555;--text3:#888;}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:var(--gray);min-height:100vh;max-width:430px;margin:0 auto;}
.header{background:linear-gradient(135deg,var(--blue),var(--blue2));padding:16px 20px 20px;color:white;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(15,76,117,0.4);display:flex;align-items:center;}
.badge{margin-left:auto;background:rgba(255,255,255,0.2);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;}
.body{padding:14px 14px 100px;}
.section{background:white;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.sec-title{font-size:12px;font-weight:800;color:var(--blue);letter-spacing:1px;margin-bottom:14px;}
.row{margin-bottom:14px;}.row:last-child{margin-bottom:0;}
.label{font-size:12px;font-weight:700;color:#444;margin-bottom:6px;}
.hint{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.5;}
input[type=text],input[type=date],input[type=time],input[type=email],input[type=number],select,textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:16px;color:var(--text);outline:none;background:var(--gray2);font-family:inherit;box-sizing:border-box;}
textarea{resize:none;line-height:1.6;}
.chip-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.chip{padding:8px 14px;border-radius:20px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#F1F5F9;color:var(--text2);font-family:inherit;}
.chip.active{background:var(--blue);color:white;}
.small-btn{background:var(--blue-light);color:var(--blue2);border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-room-btn{width:100%;padding:10px;border-radius:12px;border:2px dashed var(--blue2);background:var(--blue-light);color:var(--blue2);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.room-card{display:flex;align-items:center;gap:12px;padding:14px;background:white;border-radius:14px;margin-bottom:8px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid var(--border);}
.sbadge{border-radius:10px;padding:3px 10px;font-size:12px;font-weight:700;color:white;}
.footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;padding:10px 14px 20px;box-shadow:0 -4px 20px rgba(0,0,0,0.1);}
.primary-btn{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit;}
.back-btn{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit;}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.photo-add{width:100%;aspect-ratio:1;border-radius:10px;border:2px dashed var(--blue2);background:var(--blue-light);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--blue2);gap:2px;font-size:10px;font-weight:600;}
.photo-wrap{position:relative;}
.photo-wrap img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;}
.photo-remove{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.6);border:none;color:white;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.share-btn{border:none;border-radius:14px;padding:12px 8px;color:white;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;font-weight:800;font-family:inherit;}
.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:var(--blue);color:white;padding:12px 22px;border-radius:22px;font-size:14px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.25);pointer-events:none;max-width:90%;text-align:center;}
.gas-ok{background:#D1FAE5;border:1.5px solid #10B981;color:#065F46;border-radius:12px;padding:10px 14px;font-size:12px;margin-bottom:10px;}
.gas-sending{background:#FEF3C7;border:1.5px solid #F59E0B;color:#92400E;border-radius:12px;padding:10px 14px;font-size:12px;margin-bottom:10px;}
.history-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid var(--blue2);}
.worker-fixed{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;margin-right:8px;margin-bottom:8px;}
.email-suggest{position:absolute;left:0;right:0;background:white;border:1.5px solid var(--border);border-radius:12px;margin-top:2px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.12);overflow:hidden;}
.email-suggest-item{padding:12px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text);}
.email-suggest-item:last-child{border-bottom:none;}
.preview-card{background:white;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.preview-title{font-size:13px;font-weight:800;color:var(--blue);margin-bottom:12px;}
.preview-row{display:flex;border-bottom:1px solid #F0F4F8;padding:8px 0;}
.preview-label{font-size:12px;color:var(--text3);width:110px;flex-shrink:0;}
.preview-val{font-size:13px;color:var(--text);font-weight:600;}
.save-notice{background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:12px;padding:10px 14px;font-size:11px;color:#92400E;margin-bottom:10px;line-height:1.6;}
.photo-guide{background:var(--blue-light);border:1.5px solid #BFDBFE;border-radius:12px;padding:12px 14px;margin-top:10px;font-size:11px;color:var(--blue);line-height:1.8;}
.check-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;cursor:pointer;background:#F8FAFC;border:1.5px solid var(--border);margin-bottom:6px;}
.check-item.checked{background:var(--blue-light);border-color:var(--blue2);}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== AUTH =====
const _AUTH_PASS="○○○○";
(function(){
  const stored=localStorage.getItem("cleaning_auth_v1");
  if(stored===_AUTH_PASS)return;
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F0F4F8;font-family:sans-serif"><div style="background:white;border-radius:20px;padding:32px 24px;width:320px;box-shadow:0 4px 20px rgba(0,0,0,0.1);text-align:center"><div style="font-size:48px;margin-bottom:12px">🔒</div><div style="font-size:18px;font-weight:800;color:#0F4C75;margin-bottom:6px">清掃報告書</div><div style="font-size:12px;color:#888;margin-bottom:24px">このアプリはパスワードで保護されています</div><input id="pw_input" type="password" placeholder="パスワードを入力" style="width:100%;border:1.5px solid #E2E8F0;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;box-sizing:border-box;margin-bottom:12px;font-family:inherit"><button id="pw_btn" style="width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#0F4C75,#1B6CA8);color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit">ログイン</button><div id="pw_err" style="color:#EF4444;font-size:12px;margin-top:10px;display:none">パスワードが違います</div></div></div>';
  document.getElementById("pw_btn").onclick=function(){
    const val=document.getElementById("pw_input").value;
    if(val===_AUTH_PASS){localStorage.setItem("cleaning_auth_v1",_AUTH_PASS);location.reload();}
    else{document.getElementById("pw_err").style.display="block";}
  };
  document.getElementById("pw_input").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("pw_btn").click();});
  throw new Error("auth required");
})();

// ===== GAS =====
const GAS_URL="https://script.google.com/macros/s/AKfycbwudqoe8afkydaIF7_4pWkmrjEKVoSJYzJvJNMiaFuV73XEI3KQ_wIMtyjd15ypDuDEiQ/exec";

// ===== 定数 =====
const SERVICE_TYPES=["ハウスクリーニング","エアコン洗浄","ワックス剥離","強化洗浄","鏡研磨","床研磨","換気扇洗浄","窓清掃","排水管洗浄","消臭・除菌","浴室特殊洗浄","トイレ特殊洗浄","ガラス清掃","原状回復","その他"];
const SITE_TYPES=["空室","在宅","共用部","その他"];
const MADORI_OPTIONS=[{val:"1R",label:"1R（居室1）"},{val:"1K",label:"1K（居室1）"},{val:"1DK",label:"1DK（居室1＋DK）"},{val:"1LDK",label:"1LDK（居室1＋LDK）"},{val:"2K",label:"2K（居室2）"},{val:"2DK",label:"2DK（居室2＋DK）"},{val:"2LDK",label:"2LDK（居室2＋LDK）"},{val:"3K",label:"3K（居室3）"},{val:"3DK",label:"3DK（居室3＋DK）"},{val:"3LDK",label:"3LDK（居室3＋LDK）"},{val:"4LDK+",label:"4LDK以上"}];
const MADORI_EX=["ロフト有り","メゾネット","テラスハウス"];
const STATUSES=["完了","未完了","対象外"];
const SC={"完了":{color:"#10B981",icon:"👍"},"未完了":{color:"#EF4444",icon:"❌"},"対象外":{color:"#94A3B8",icon:"—"}};
const JUDGES=[{label:"OK/引渡し可",color:"#10B981"},{label:"再訪問",color:"#F59E0B"},{label:"⚠️ 異常あり（要報告）",color:"#EF4444"}];
const RC=["天井/壁クロス","照明器具","窓・サッシ","床（フローリング/畳）","ドア","巾木","スイッチコンセント","エアコン","クローゼット","棚","カーテンレール","収納スペース"];
const ALL_ROOMS=[
  {id:"genkan",label:"玄関",icon:"🚪",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","ドア","巾木","スイッチコンセント","鏡","下駄箱","玄関ドア","インターフォン"]},
  {id:"corridor",label:"廊下・階段",icon:"🪜",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","巾木","スイッチコンセント","手すり","窓・サッシ"]},
  {id:"kitchen",label:"キッチン",icon:"🍳",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","巾木","スイッチコンセント","シンク","コンロ","換気扇","壁タイル","収納","冷蔵庫周辺","排水口"]},
  {id:"dining",label:"ダイニング",icon:"🪑",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","ドア","巾木","スイッチコンセント","窓・サッシ"]},
  {id:"living",label:"リビング",icon:"🛋️",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","ドア","巾木","スイッチコンセント","窓・サッシ","カーテンレール"]},
  {id:"bath",label:"浴室",icon:"🛁",checks:["浴槽","壁","床","天井","鏡","シャワー","排水口","換気扇","ドア","照明器具","タオルバー"]},
  {id:"washroom",label:"洗面所",icon:"🪥",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","巾木","スイッチコンセント","洗面台","鏡","収納","換気扇"]},
  {id:"washroom2",label:"洗面所2",icon:"🪥",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","巾木","スイッチコンセント","洗面台","鏡","収納","換気扇"]},
  {id:"laundry",label:"洗濯室",icon:"🫧",checks:["防水バン","水栓","床","壁","棚","蛇口","換気扇","排水口"]},
  {id:"toilet",label:"トイレ",icon:"🚽",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","巾木","スイッチコンセント","便器","タンク","ペーパーホルダー","換気扇","ドア","棚"]},
  {id:"toilet2",label:"トイレ2",icon:"🚽",checks:["天井/壁クロス","照明器具","床（フローリング/畳）","巾木","スイッチコンセント","便器","タンク","ペーパーホルダー","換気扇","ドア","棚"]},
  {id:"room1",label:"居室1",icon:"🛏️",checks:RC.slice()},
  {id:"room2",label:"居室2",icon:"🛏️",checks:RC.slice()},
  {id:"room3",label:"居室3",icon:"🛏️",checks:RC.slice()},
  {id:"room4",label:"居室4",icon:"🛏️",checks:RC.slice()},
  {id:"sotomawari",label:"外回り・ベランダ",icon:"🌿",checks:["ベランダ","室外機","サッシガラス","網戸","窓","手すり","排水溝","床"]},
];

function getBaseIds(madori){
  const f=["genkan","corridor","kitchen","bath","washroom","laundry","toilet","sotomawari"];
  let d=[];
  if(!madori||madori==="1R"||madori==="1K") d=["room1"];
  else if(madori==="1DK") d=["dining","room1"];
  else if(madori==="1LDK") d=["living","dining","room1"];
  else if(madori==="2K") d=["room1","room2"];
  else if(madori==="2DK") d=["dining","room1","room2"];
  else if(madori==="2LDK") d=["living","dining","room1","room2"];
  else if(madori==="3K") d=["room1","room2","room3"];
  else if(madori==="3DK") d=["dining","room1","room2","room3"];
  else if(madori==="3LDK") d=["living","dining","room1","room2","room3"];
  else if(madori==="4LDK+") d=["living","dining","room1","room2","room3","room4"];
  return [...f.slice(0,3),...d,...f.slice(3)];
}
function roomInfo(id){return ALL_ROOMS.find(r=>r.id===id);}

// ===== LocalStorage =====
const LS="cleaning_v5";
const LSH="cleaning_hist_v1";
const LSE="cleaning_email_v1";

function saveLS(f){
  try{
    const s={...f,rooms:f.rooms.map(r=>({...r,beforePhotos:[],afterPhotos:[]})),confirmPhotos:Array(10).fill(null),parkingReceipt:null,startReportPhotos:[]};
    localStorage.setItem(LS,JSON.stringify(s));
  }catch(e){}
}
function loadLS(){try{const s=localStorage.getItem(LS);return s?JSON.parse(s):null;}catch(e){return null;}}
function clearLS(){localStorage.removeItem(LS);}

function saveHist(r){
  try{const h=getHist();h.unshift({...r,at:new Date().toLocaleString("ja-JP")});localStorage.setItem(LSH,JSON.stringify(h.slice(0,30)));}catch(e){}
}
function getHist(){try{const h=localStorage.getItem(LSH);return h?JSON.parse(h):[];}catch(e){return[];}}

function saveEmail(email){
  if(!email||!email.includes("@"))return;
  try{
    const list=getEmails();
    const filtered=list.filter(function(e){return e!==email;});
    filtered.unshift(email);
    localStorage.setItem(LSE,JSON.stringify(filtered.slice(0,10)));
  }catch(e){}
}
function getEmails(){try{const e=localStorage.getItem(LSE);return e?JSON.parse(e):[];}catch(e){return[];}}

function newRoom(id){return{roomId:id,status:"未完了",checks:[],memo:"",beforePhotos:[],afterPhotos:[],savedAt:null};}

function initForm(madori){
  madori=madori||"";
  const ids=getBaseIds(madori);
  return{
    dateStart:"",dateEnd:"",propertyName:"",address:"",
    services:[],serviceOther:"",startTime:"",endTime:"",
    extraWorkers:[],siteType:"",madori:madori,madoriEx:[],
    hasKey:null,autolockNo:"",keyboxNo:"",
    hasParking:null,parkingFee:0,parkingReceipt:null,
    extraRooms:[],rooms:ids.map(newRoom),
    overallJudge:"",reportMemo:"",
    confirmPhotos:Array(10).fill(null),
    inspectorName:"佐土原",clientEmail:"",
    startReportPhotos:[],startReportSent:false
  };
}

// ===== State =====
var S={form:null,page:"main",activeRoom:null,toast:null,toastTimer:null,gasStatus:null,sending:false,showEmailList:false};

(function(){
  var saved=loadLS();
  if(saved){
    var ids=getBaseIds(saved.madori||"");
    var extraIds=saved.extraRooms||[];
    var allIds=ids.concat(extraIds);
    var merged=allIds.map(function(id){return (saved.rooms||[]).find(function(r){return r.roomId===id;})||newRoom(id);});
    S.form=Object.assign(initForm(saved.madori||""),saved,{rooms:merged,confirmPhotos:Array(10).fill(null),parkingReceipt:null,startReportPhotos:[]});
  } else {
    S.form=initForm();
  }
})();

function showToast(msg,color){
  color=color||"#0F4C75";
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toast={msg:msg,color:color};render();
  S.toastTimer=setTimeout(function(){S.toast=null;render();},3000);
}

function setForm(patch){
  S.form=Object.assign({},S.form,patch);
  saveLS(S.form);
  render();
}

function getAllWorkers(){
  return["佐土原"].concat(S.form.extraWorkers||[]).filter(Boolean);
}

function updateMadori(madori){
  var ids=getBaseIds(madori);
  var extraIds=S.form.extraRooms||[];
  var allIds=ids.concat(extraIds);
  var existing=S.form.rooms;
  var merged=allIds.map(function(id){return existing.find(function(r){return r.roomId===id;})||newRoom(id);});
  setForm({madori:madori,rooms:merged});
}

function updateRoom(id,patch){
  setForm({rooms:S.form.rooms.map(function(r){return r.roomId===id?Object.assign({},r,patch):r;})});
}

function saveRoom(id){
  var t=new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  updateRoom(id,{savedAt:t});
  showToast("💾 一時保存しました","#0F4C75");
}

function getRoomData(id){return S.form.rooms.find(function(r){return r.roomId===id;});}

function getActiveIds(){
  return getBaseIds(S.form.madori).concat(S.form.extraRooms||[]);
}

function addExtraRoom(id){
  if((S.form.extraRooms||[]).indexOf(id)>=0)return;
  var extraRooms=(S.form.extraRooms||[]).concat([id]);
  var rooms=S.form.rooms.concat([newRoom(id)]);
  setForm({extraRooms:extraRooms,rooms:rooms});
  showToast("✅ "+roomInfo(id).label+"を追加しました","#10B981");
}

function removeExtraRoom(id){
  setForm({
    extraRooms:(S.form.extraRooms||[]).filter(function(r){return r!==id;}),
    rooms:S.form.rooms.filter(function(r){return r.roomId!==id;})
  });
}

function handlePhotos(key,files,isArray){
  if(!files||!files.length)return;
  if(isArray){
    var p=Array.from(files).map(function(f){return{url:URL.createObjectURL(f),name:f.name,file:f};});
    var cur=S.form[key]||[];
    var patch2={};patch2[key]=cur.concat(p).slice(0,10);setForm(patch2);
  } else {
    var obj={};obj[key]={url:URL.createObjectURL(files[0]),name:files[0].name,file:files[0]};
    setForm(obj);
  }
}

function handleRoomPhoto(id,type,files){
  var p=Array.from(files).map(function(f){return{url:URL.createObjectURL(f),name:f.name,file:f};});
  var rd=getRoomData(id);
  var patch={};patch[type]=(rd[type]||[]).concat(p).slice(0,10);
  updateRoom(id,patch);
}

function handleConfirmPhoto(i,file){
  if(!file)return;
  var arr=S.form.confirmPhotos.slice();
  arr[i]={url:URL.createObjectURL(file),name:file.name,file:file};
  setForm({confirmPhotos:arr});
}

// ===== Base64 =====
function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(e.target.result.split(",")[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function photosToB64(photos){
  if(!photos||!photos.length)return[];
  var result=[];
  for(var i=0;i<photos.length;i++){
    var p=photos[i];
    if(p&&p.file){try{result.push(await fileToBase64(p.file));}catch(e){result.push(null);}}
    else result.push(null);
  }
  return result;
}

// ===== GAS送信 =====
async function sendToGAS(data){
  try{
    var res=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(JSON.stringify(data))});
    return await res.json();
  }catch(e){
    try{
      var res2=await fetch(GAS_URL+"?data="+encodeURIComponent(JSON.stringify(data)));
      return await res2.json();
    }catch(e2){throw e2;}
  }
}

async function submitStartReport(){
  if(S.sending)return;
  S.sending=true;S.gasStatus="sending";render();
  try{
    var f=S.form;
    var rooms=[];
    for(var i=0;i<(f.startReportPhotos||[]).length;i++){

    showToast("✅ 送信しました！スプレッドシートに記録されます","#10B981");

async function submitFullReport(){
  if(S.sending)return;
  S.sending=true;S.gasStatus="sending";render();
  try{
    var f=S.form;
    var rooms=[];
    for(var i=0;i<f.rooms.length;i++){
      var rd=f.rooms[i];
      var ri=roomInfo(rd.roomId);
      var bp=await photosToB64(rd.beforePhotos||[]);
      var ap=await photosToB64(rd.afterPhotos||[]);
      rooms.push({roomId:rd.roomId,label:ri?ri.label:rd.roomId,status:rd.status,checks:rd.checks,memo:rd.memo,beforePhotos:bp,afterPhotos:ap});
    }
    var data={propertyName:f.propertyName,address:f.address,dateStart:f.dateStart,dateEnd:f.dateEnd,services:f.services,serviceOther:f.serviceOther,startTime:f.startTime,endTime:f.endTime,workers:getAllWorkers(),siteType:f.siteType,madori:f.madori,hasKey:f.hasKey,autolockNo:f.autolockNo,keyboxNo:f.keyboxNo,hasParking:f.hasParking,parkingFee:f.parkingFee,overallJudge:f.overallJudge,reportMemo:f.reportMemo,inspectorName:f.inspectorName,clientEmail:f.clientEmail,rooms:rooms};

  }finally{S.sending=false;render();}
}

  html+='<div class="body">';

  html+='<div class="section"><div class="sec-title">✨ After 写真（最大10枚）</div><div class="photo-grid">';
  (data.afterPhotos||[]).forEach(function(p,i){html+='<div class="photo-wrap"><img src="'+p.url+'"><button class="photo-remove" onclick="removeRoomPhoto(\''+id+'\',\'afterPhotos\','+i+')">×</button></div>';});

  html+='<div style="background:rgba(255,255,255,0.1);padding:14px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">';

  [["依頼内容",f.services.join("、")||"—"],["作業時間",(f.startTime&&f.endTime?(f.startTime+" ～ "+f.endTime):"—")],["担当者",getAllWorkers().join("、")||"—"],["現場種別",f.siteType||"—"],["間取り",f.madori?f.madori+((f.madoriEx&&f.madoriEx.length)?"（"+f.madoriEx.join("・")+"）":""):"—"],["鍵の有無",(f.hasKey===true?"有":f.hasKey===false?"無":"—")],["駐車場",(f.hasParking===true?"有 ¥"+f.parkingFee:f.hasParking===false?"無":"—")],["検査者",f.inspectorName||"—"]].forEach(function(item){html+='<div class="preview-row"><span class="preview-label">'+item[0]+'</span><span class="preview-val">'+escHtml(item[1])+'</span></div>';});

  ids.forEach(function(id){

    html+='<div style="border-bottom:1px solid #F0F4F8;padding-bottom:12px;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span>'+ri.icon+'</span><span style="font-weight:700;font-size:14px;flex:1">'+ri.label+'</span><span style="background:'+cfg.color+';color:white;font-size:11px;font-weight:700;border-radius:8px;padding:2px 10px">'+cfg.icon+' '+rd.status+'</span></div>';
    if(rd.checks.length>0){html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">';rd.checks.forEach(function(c){html+='<span style="background:#EFF6FF;color:#1B6CA8;font-size:11px;border-radius:6px;padding:2px 7px">'+c+'</span>';});html+='</div>';}

    html+='</div>';
  });
  html+='</div>';
  if(f.reportMemo){html+='<div class="preview-card"><div class="preview-title">報告メモ</div><p style="font-size:14px;color:#333;line-height:1.7">'+escHtml(f.reportMemo)+'</p></div>';}
  html+='<div style="text-align:center;padding:16px;color:#AAA;font-size:11px;margin-bottom:20px">本報告書は清掃完了時に生成されました</div></div>';

function renderHistory(){
  var history=getHist();
  var html='<div class="header"><button class="back-btn" onclick="goPage(\'main\')">← 戻る</button><div style="text-align:center;flex:1"><div style="font-size:10px;opacity:.75;letter-spacing:2px">HISTORY</div><div style="font-size:17px;font-weight:800">報告履歴</div></div><div style="width:60px"></div></div>';
  html+='<div class="body">';
  if(history.length===0){
    html+='<div style="text-align:center;padding:40px;color:#888"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:14px">まだ履歴がありません</div><div style="font-size:12px;margin-top:8px">報告書を送信するとここに記録されます</div></div>';
  } else {
    history.forEach(function(h){
      html+='<div class="history-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:18px">'+(h.type==="complete"?"✅":"🔔")+'</span><div style="flex:1"><div style="font-weight:700;font-size:14px">'+(h.propertyName||"（物件名なし）")+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+(h.at||"")+'</div></div><span style="background:'+(h.type==="complete"?"#D1FAE5":"#FEF3C7")+';color:'+(h.type==="complete"?"#065F46":"#92400E")+';font-size:11px;font-weight:700;border-radius:8px;padding:3px 10px">'+(h.type==="complete"?"完了報告":"開始報告")+'</span></div>';
      html+='<div style="font-size:12px;color:#666;display:flex;flex-wrap:wrap;gap:12px"><span>📅 '+(h.dateStart||"—")+'</span><span>👤 '+((h.workers||[]).join("、")||"—")+'</span>'+(h.overallJudge?'<span>📊 '+h.overallJudge+'</span>':"")+'</div>';
      if(h.folderLink){html+='<a href="'+h.folderLink+'" target="_blank" style="display:inline-block;margin-top:8px;font-size:11px;color:#1B6CA8;font-weight:700">📁 写真フォルダを開く →</a>';}
      html+='</div>';
    });
    html+='<button onclick="if(confirm(\'履歴をすべて削除しますか？\')){localStorage.removeItem(\''+LSH+'\');goPage(\'history\');}" style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #EF4444;background:none;color:#EF4444;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px">🗑️ 履歴をすべて削除</button>';
  }
  html+='</div>';
  return html;
}

// ===== ユーティリティ =====
function escHtml(s){
  if(!s)return"";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ===== グローバル関数 =====
window.setForm=setForm;
window.updateRoom=updateRoom;
window.updateMadori=updateMadori;
window.saveRoom=saveRoom;
window.handlePhotos=handlePhotos;
window.handleRoomPhoto=handleRoomPhoto;
window.handleConfirmPhoto=handleConfirmPhoto;
window.addExtraRoom=addExtraRoom;
window.removeExtraRoom=removeExtraRoom;
window.buildStartText=buildStartText;
window.buildReportText=buildReportText;
window.submitStartReport=submitStartReport;
window.submitFullReport=submitFullReport;
window.saveEmail=saveEmail;

window.goPage=function(p){S.page=p;S.gasStatus=null;render();};
window.goRoom=function(id){S.activeRoom=id;S.page="room";render();};

window.toggleService=function(s){
  var cur=S.form.services;
  setForm({services:cur.indexOf(s)>=0?cur.filter(function(x){return x!==s;}):cur.concat([s])});
};
window.toggleMadoriEx=function(ex){
  var cur=S.form.madoriEx||[];
  setForm({madoriEx:cur.indexOf(ex)>=0?cur.filter(function(x){return x!==ex;}):cur.concat([ex])});
};
window.addWorker=function(){
  var el=document.getElementById("newWorkerInput");
  if(!el||!el.value.trim())return;
  setForm({extraWorkers:(S.form.extraWorkers||[]).concat([el.value.trim()])});
};
window.removeWorker=function(i){setForm({extraWorkers:(S.form.extraWorkers||[]).filter(function(_,j){return j!==i;})});};
window.toggleCheckByIdx=function(id,ci){
  var ri=roomInfo(id);
  var item=ri.checks[ci];
  if(!item)return;
  var rd=getRoomData(id);
  updateRoom(id,{checks:rd.checks.indexOf(item)>=0?rd.checks.filter(function(c){return c!==item;}):rd.checks.concat([item])});
};
window.toggleAllChecks=function(id){
  var rd=getRoomData(id);var ri=roomInfo(id);
  updateRoom(id,{checks:rd.checks.length===ri.checks.length?[]:ri.checks.slice()});
};
window.removeRoomPhoto=function(id,type,i){
  var rd=getRoomData(id);
  var patch={};patch[type]=rd[type].filter(function(_,j){return j!==i;});
  updateRoom(id,patch);
};
window.removeConfirmPhoto=function(i){var a=S.form.confirmPhotos.slice();a[i]=null;setForm({confirmPhotos:a});};
window.removeStartPhoto=function(i){setForm({startReportPhotos:(S.form.startReportPhotos||[]).filter(function(_,j){return j!==i;})});};
window.copyText=function(text){navigator.clipboard.writeText(text).then(function(){showToast("✅ コピーしました！LINEに貼り付けてください","#10B981");});};
window.showEmails=function(){
  var el=document.getElementById("emailDropdown");
  if(el)el.style.display="block";
};
window.hideEmails=function(){
  var el=document.getElementById("emailDropdown");
  if(el)el.style.display="none";
};
window.pickEmail=function(email){
  setForm({clientEmail:email});
  var el=document.getElementById("emailInput");
  if(el)el.value=email;
  hideEmails();
};
window.sendStartEmail=function(){
  var f=S.form;
  window.open("mailto:"+encodeURIComponent(f.clientEmail||"")+"?subject="+encodeURIComponent("【作業開始報告】"+(f.propertyName||"物件名未入力"))+"&body="+encodeURIComponent(buildStartText()));
  setForm({startReportSent:true});
};
window.sendReportEmail=function(){
  var f=S.form;
  if(!f.clientEmail){showToast("⚠️ クライアントメールを入力してください","#EF4444");return;}
  saveEmail(f.clientEmail);
  var ds=f.dateEnd?(f.dateStart+" ～ "+f.dateEnd):f.dateStart;
  window.open("mailto:"+encodeURIComponent(f.clientEmail)+"?subject="+encodeURIComponent("清掃報告書："+( f.propertyName||"物件名未入力")+" "+ds)+"&body="+encodeURIComponent(buildReportText()));
};
window.clearAndReset=function(){if(confirm("入力内容をリセットしますか？")){clearLS();S.form=initForm();render();}};

render();
</script>
